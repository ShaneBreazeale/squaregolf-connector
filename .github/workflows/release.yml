name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.3.0-alpha.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04 # Linux x86_64
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest # Windows x64
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "name=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "SquareGolf Connector ${{ steps.tag.outputs.name }}"
          releaseBody: |
            Automated multi-platform build.

            - macOS (Apple Silicon / aarch64): `.dmg`, `.app`
            - Linux (x86_64): `.AppImage`, `.deb`, `.rpm`
            - Windows (x64): `.msi`, `.exe`
          releaseDraft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          args: ${{ matrix.args }}
